<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WASH - Web Terminal</title>
    <link rel="stylesheet" href="/static/xterm.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background-attachment: fixed;
            background: #0F2027;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        body.light {
            background: #E0EAFC;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        body.dark {
            background: #0F2027;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        #login-screen {
            display: flex; justify-content: center; align-items: center;
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            opacity: 1;
            transition: opacity 0.5s ease;
            pointer-events: auto;
        }
        #login-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .login-box {
            background: rgb(0 0 0 / 60%);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px 40px 20px 40px; border-radius: 10px;
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.3);
            outline: 1px solid rgba(255, 255, 255, 0.2);
            width: 400px; max-width: 90vw;
            color: #eee;
        }
        .login-box h1 {
            text-align: center; margin-bottom: 8px; font-size: 2em;
            background: linear-gradient(135deg, #fff, #e94560);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .login-box .subtitle { text-align: center; color: rgba(255, 255, 255, 0.8); margin-bottom: 30px; font-size: 0.9em; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 6px; color: rgba(255, 255, 255, 0.9); font-size: 0.9em; }
        .form-group input, .form-group select {
            width: 100%; padding: 12px 16px; border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; background: rgba(255, 255, 255, 0.1); color: #eee; font-size: 1em;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #e94560; background: rgba(255, 255, 255, 0.15); box-shadow: 0 0 20px rgba(233, 69, 96, 0.3); }
        .btn {
            width: 100%; padding: 14px; border: 1px solid #e94560;
            border-radius: 12px;
            background: #e94560;
            color: white;
            font-size: 1em; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
        }
        .btn:hover {
            background: #d43e54;
            border-color: #d43e54;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.5);
        }
        .btn:active { transform: translateY(0); }
        .login-error { color: #ff6b6b; text-align: center; font-size: 0.9em; }
        #terminal-screen {
            display: flex; flex-direction: column; height: 100%; height: 100dvh;
            position: fixed; top: 0; left: 0; width: 100%;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        #terminal-screen.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .term-header {
            background: rgb(0 0 0 / 60%);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 20px; display: flex;
            justify-content: space-between; align-items: center;
            color: #eee;
            position: relative;
            z-index: 10;
            flex-shrink: 0;
            flex-wrap: wrap; gap: 8px;
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.3);
            outline: 1px solid rgba(255, 255, 255, 0.2);
        }
        .term-header h2 { font-size: 1.2em; background: linear-gradient(135deg, #fb9696, #e94560); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .term-header .user-info { color: rgba(255, 255, 255, 0.8); font-size: 0.9em; white-space: nowrap; display: inline-flex; align-items: center; gap: 14px; }
        .term-header #host-info { color: rgba(255, 255, 255, 0.7); font-size: 0.8em; }
        .term-header .status-item { display: inline-flex; align-items: center; gap: 8px; color: rgba(255, 255, 255, 0.85); font-size: 0.9em; white-space: nowrap; cursor: default; }
        .term-header .status-item svg { flex-shrink: 0; opacity: 0.8; pointer-events: none; }
        .header-divider {
            width: 1px;
            height: 24px;
            background: rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }
        .hamburger-btn {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            width: 36px;
            height: 36px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }
        .hamburger-btn span {
            display: block;
            width: 18px;
            height: 2px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        .hamburger-btn:hover {
            background: rgba(233, 69, 96, 0.4);
            border-color: rgba(233, 69, 96, 0.5);
        }
        .hamburger-btn.active span:nth-child(1) {
            transform: translateY(6px) rotate(45deg);
        }
        .hamburger-btn.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger-btn.active span:nth-child(3) {
            transform: translateY(-6px) rotate(-45deg);
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .header-dropdown-backdrop {
            opacity: 0;
            visibility: hidden;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 98;
            background: rgba(0,0,0,0.3);
            transition: opacity 0.25s ease, visibility 0.25s ease;
        }
        .header-dropdown-backdrop.open {
            opacity: 1;
            visibility: visible;
        }
        .header-dropdown {
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px);
            position: fixed;
            top: 56px;
            left: 0;
            right: 0;
            background: rgba(30, 50, 60, 0.97);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px;
            z-index: 99;
            flex-direction: column;
            gap: 14px;
            align-items: stretch;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s ease;
            pointer-events: none;
        }
        .header-dropdown.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
            pointer-events: auto;
        }
        .header-dropdown .user-info {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85em;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }
        .header-dropdown .status-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.85em;
            white-space: nowrap;
            cursor: default;
        }
        .header-dropdown .status-item svg {
            flex-shrink: 0;
            opacity: 0.8;
        }
        .header-dropdown-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
            margin: 6px 0;
        }
        .header-dropdown-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .header-dropdown-actions button {
            flex: 1;
            max-width: 160px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #eee;
            padding: 10px 14px;
            font-size: 0.85em;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .header-dropdown-actions button:hover {
            background: rgba(233, 69, 96, 0.4);
            border-color: rgba(233, 69, 96, 0.5);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }
        .term-header .btn-theme,
        .term-header .btn-logout,
        .term-header .btn-new-session {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #eee;
            padding: 8px 14px;
            font-size: 0.9em;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .term-header .btn-theme {
            gap: 4px;
            padding: 8px 12px;
        }
        .term-header .btn-theme:hover,
        .term-header .btn-logout:hover,
        .term-header .btn-new-session:hover {
            background: rgba(233, 69, 96, 0.4);
            border-color: rgba(233, 69, 96, 0.5);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }
        #terminal-container {
            flex: 1;
            min-height: 0;
            position: relative;
            overflow: hidden;
            padding: 30px;
        }
        #terminal-wrapper {
            height: 100%;
            padding: 15px;
            border-radius: 10px;
            background: rgb(0 0 0 / 60%);
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            outline: 1px solid rgba(255, 255, 255, 0.2);
        }
        #xterm-clip {
            overflow: hidden;
            border-radius: inherit;
            height: 100%;
        }
        body.light #terminal-wrapper {
            background: rgb(255 255 255 / 70%);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            outline-color: rgba(255, 255, 255, 0.6);
        }
        #terminal-container .xterm-viewport::-webkit-scrollbar {
            width: 8px;
        }
        #terminal-container .xterm-viewport::-webkit-scrollbar-track {
            background: transparent;
        }
        #terminal-container .xterm-viewport::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            min-height: 40px;
        }
        #terminal-container .xterm-viewport::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }
        #terminal-container .xterm-viewport {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
        }
        body.light #terminal-container .xterm-viewport::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
        }
        body.light #terminal-container .xterm-viewport::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.25);
        }
        body.light #terminal-container .xterm-viewport {
            scrollbar-color: rgba(0, 0, 0, 0.15) transparent;
        }
        @font-face {
            font-family: 'MesloLGM Nerd Font';
            src: url('/static/fonts/MesloLGMNerdFont-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'MesloLGM Nerd Font';
            src: url('/static/fonts/MesloLGMNerdFont-Bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'MesloLGM Nerd Font';
            src: url('/static/fonts/MesloLGMNerdFont-Italic.ttf') format('truetype');
            font-weight: normal;
            font-style: italic;
            font-display: swap;
        }
        @font-face {
            font-family: 'MesloLGM Nerd Font';
            src: url('/static/fonts/MesloLGMNerdFont-BoldItalic.ttf') format('truetype');
            font-weight: bold;
            font-style: italic;
            font-display: swap;
        }
        .connection-status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; box-shadow: 0 0 10px currentColor; }
        .connection-status.connected { background: #4caf50; color: #4caf50; }
        .connection-status.disconnected { background: #e94560; color: #e94560; }
        .connection-status.connecting { background: #ff9800; color: #ff9800; }

        .btn-theme {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #eee;
            padding: 8px 12px;
            font-size: 1.1em;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-theme:hover {
            background: rgba(233, 69, 96, 0.4);
            border-color: rgba(233, 69, 96, 0.5);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }
        body.light .btn-theme {
            background: rgba(255, 255, 255, 0.6);
            color: #333;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
        body.light .btn {
            border-color: #e94560;
            background: #e94560;
            color: white;
        }
        body.light .btn:hover {
            background: #d43e54;
            border-color: #d43e54;
        }
        body.light .btn-theme:hover {
            background: rgba(233, 69, 96, 0.2);
            border-color: rgba(233, 69, 96, 0.3);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.2);
        }

        body.light .login-box {
            background: rgb(255 255 255 / 70%);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            outline: 1px solid rgba(255, 255, 255, 0.6);
            color: #333;
        }
        body.light .login-box h1 {
            background: linear-gradient(135deg, #e94560, #0f3460);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        body.light .login-box .subtitle { color: rgba(0, 0, 0, 0.7); }
        body.light .form-group label { color: rgba(0, 0, 0, 0.8); }
        body.light .form-group input,
        body.light .form-group select {
            background: rgba(255, 255, 255, 0.7); color: #333; border-color: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }
        body.light .form-group input:focus,
        body.light .form-group select:focus { border-color: #e94560; background: rgba(255, 255, 255, 0.9); box-shadow: 0 0 20px rgba(233, 69, 96, 0.2); }
        body.light .term-header {
            background: rgb(255 255 255 / 70%);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: #333;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            outline: 1px solid rgba(255, 255, 255, 0.6);
        }
        body.light .term-header h2 { color: #e94560; }
        body.light .term-header .user-info { color: rgba(0, 0, 0, 0.7); }
        body.light .header-divider { background: rgba(0, 0, 0, 0.15); }
        body.light .term-header #host-info { color: rgba(0, 0, 0, 0.7); }
        body.light .term-header .status-item { color: rgba(0, 0, 0, 0.75); }
        body.light .term-header .status-item svg { opacity: 0.7; }
        body.light .term-header .btn-theme,
        body.light .term-header .btn-logout,
        body.light .term-header .btn-new-session {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #333;
            padding: 8px 14px;
            font-size: 0.9em;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        body.light .term-header .btn-theme { padding: 8px 12px; gap: 4px; }
        body.light .term-header .btn-theme:hover,
        body.light .term-header .btn-logout:hover,
        body.light .term-header .btn-new-session:hover {
            background: rgba(233, 69, 96, 0.2);
            border-color: rgba(233, 69, 96, 0.3);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.2);
        }
        body.light .header-dropdown {
            background: rgba(240, 245, 250, 0.97);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
        body.light .header-dropdown .user-info,
        body.light .header-dropdown .status-item {
            color: rgba(0, 0, 0, 0.8);
        }
        body.light .header-dropdown .status-item svg {
            opacity: 0.7;
        }
        body.light .header-dropdown-divider {
            background: rgba(0, 0, 0, 0.1);
        }
        body.light .header-dropdown-actions button {
            background: rgba(255, 255, 255, 0.6);
            border-color: rgba(0, 0, 0, 0.15);
            color: rgba(0, 0, 0, 0.8);
        }
        body.light .header-dropdown-actions button:hover {
            background: rgba(233, 69, 96, 0.2);
            border-color: #e94560;
        }
        body.light .hamburger-btn {
            background: rgba(0, 0, 0, 0.05);
            border-color: rgba(0, 0, 0, 0.15);
        }
        body.light .hamburger-btn span {
            background: rgba(0, 0, 0, 0.7);
        }
        body.light .hamburger-btn:hover {
            background: rgba(233, 69, 96, 0.15);
            border-color: rgba(233, 69, 96, 0.4);
        }
        body.light .form-group input::placeholder { color: rgba(0, 0, 0, 0.4); }

        .auth-radio-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 4px;
        }
        .auth-radio {
            position: relative;
        }
        .auth-radio input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
            pointer-events: none;
        }
        .auth-radio .radio-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            user-select: none;
        }
        .auth-radio .radio-label:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.35);
        }
        .auth-radio input[type="radio"]:checked + .radio-label {
            background: rgba(233, 69, 96, 0.25);
            border-color: #e94560;
            color: #fff;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.2);
        }
        .auth-radio .radio-label .radio-dot {
            display: inline-block;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            position: relative;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        .auth-radio .radio-label .radio-dot::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e94560;
            transition: transform 0.2s ease;
        }
        .auth-radio input[type="radio"]:checked + .radio-label .radio-dot {
            border-color: #e94560;
        }
        .auth-radio input[type="radio"]:checked + .radio-label .radio-dot::after {
            transform: translate(-50%, -50%) scale(1);
        }
        body.light .auth-radio .radio-label {
            background: rgba(255, 255, 255, 0.5);
            border-color: rgba(0, 0, 0, 0.15);
            color: rgba(0, 0, 0, 0.7);
        }
        body.light .auth-radio .radio-label:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(0, 0, 0, 0.25);
        }
        body.light .auth-radio input[type="radio"]:checked + .radio-label {
            background: rgba(233, 69, 96, 0.2);
            border-color: #e94560;
            color: #333;
        }
        body.light .auth-radio .radio-label .radio-dot {
            border-color: rgba(0, 0, 0, 0.3);
        }
        body.light .auth-radio input[type="radio"]:checked + .radio-label .radio-dot {
            border-color: #e94560;
        }

        @media (max-width: 768px) {
            .login-box {
                width: 95vw;
                padding: 25px 20px;
                margin: 10px;
            }
            .login-box h1 { font-size: 1.8em; }
            .login-box .subtitle { font-size: 0.85em; }
            .form-group label { font-size: 0.85em; }
            .form-group input, .form-group select, .btn {
                padding: 11px 14px;
                font-size: 0.95em;
            }
            .term-header {
                padding: 10px 12px;
                flex-wrap: nowrap;
                min-height: 56px;
                overflow: visible;
            }
            .term-header h2 { font-size: 1.1em; }
            .term-header #host-info { font-size: 0.75em; }
            .hamburger-btn { display: flex; }
            .header-actions { display: none !important; }
            #terminal-container {
                padding: 0;
            }
            #terminal-wrapper {
                border-radius: 0;
                outline: none;
            }
        }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <div style="display:flex;justify-content:flex-end;">

    <script>
        const CRED_KEY_STR = 'WASH-salt-key-2026';
        let credCryptoKey = null;
        let useBase64 = false;

        async function initCredKey() {
            if (credCryptoKey) return credCryptoKey;
            try {
                const raw = await crypto.subtle.importKey('raw', new TextEncoder().encode(CRED_KEY_STR), 'PBKDF2', false, ['deriveKey']);
                credCryptoKey = await crypto.subtle.deriveKey(
                    { name: 'PBKDF2', salt: new TextEncoder().encode('WASH-salt'), iterations: 100000, hash: 'SHA-256' },
                    raw,
                    { name: 'AES-GCM', length: 256 },
                    false,
                    ['encrypt', 'decrypt']
                );
                return credCryptoKey;
            } catch {
                useBase64 = true;
                console.warn('Web Crypto API unavailable, using base64 encoding');
                return null;
            }
        }

        async function encryptCred(text) {
            if (useBase64) return btoa(text);
            const key = await initCredKey();
            if (!key) return btoa(text);
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const enc = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(text));
            const buf = new Uint8Array(iv.length + enc.byteLength);
            buf.set(iv);
            buf.set(new Uint8Array(enc), iv.length);
            return btoa(String.fromCharCode(...buf));
        }

        async function decryptCred(b64) {
            if (useBase64) return atob(b64);
            const key = await initCredKey();
            if (!key) return atob(b64);
            const buf = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
            const iv = buf.slice(0, 12);
            const data = buf.slice(12);
            const dec = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
            return new TextDecoder().decode(dec);
        }

        async function saveCredentials(method, login, password) {
            const payload = JSON.stringify({ method, login, password });
            const enc = await encryptCred(payload);
            sessionStorage.setItem('WASH_creds', enc);
        }

        async function loadCredentials() {
            const enc = sessionStorage.getItem('WASH_creds');
            if (!enc) return null;
            try {
                const parsed = JSON.parse(await decryptCred(enc));
                return parsed;
            } catch (e) {
                return null;
            }
        }

        function clearCredentials() {
            sessionStorage.removeItem('WASH_creds');
        }

        const SUN_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 512 512"><path d="M256 387c-8.5 0-15.4 6.9-15.4 15.4v46.2c0 8.5 6.9 15.4 15.4 15.4s15.4-6.9 15.4-15.4v-46.2c0-8.5-6.9-15.4-15.4-15.4z" fill="currentColor"/><path d="M256 48c-8.5 0-15.4 6.9-15.4 15.4v46.2c0 8.5 6.9 15.4 15.4 15.4s15.4-6.9 15.4-15.4V63.4c0-8.5-6.9-15.4-15.4-15.4z" fill="currentColor"/><path d="M125 256c0-8.5-6.9-15.4-15.4-15.4H63.4c-8.5 0-15.4 6.9-15.4 15.4s6.9 15.4 15.4 15.4h46.2c8.5 0 15.4-6.9 15.4-15.4z" fill="currentColor"/><path d="M448.6 240.6h-46.2c-8.5 0-15.4 6.9-15.4 15.4s6.9 15.4 15.4 15.4h46.2c8.5 0 15.4-6.9 15.4-15.4s-6.9-15.4-15.4-15.4z" fill="currentColor"/><path d="M152.5 344.1c-4.1 0-8 1.6-10.9 4.5l-32.7 32.7c-2.9 2.9-4.5 6.8-4.5 10.9s1.6 8 4.5 10.9c2.9 2.9 6.8 4.5 10.9 4.5 4.1 0 8-1.6 10.9-4.5l32.7-32.7c6-6 6-15.8 0-21.8-2.9-2.9-6.8-4.5-10.9-4.5z" fill="currentColor"/><path d="M359.5 167.9c4.1 0 8-1.6 10.9-4.5l32.7-32.7c2.9-2.9 4.5-6.8 4.5-10.9s-1.6-8-4.5-10.9c-2.9-2.9-6.8-4.5-10.9-4.5-4.1 0-8 1.6-10.9 4.5l-32.7 32.7c-2.9 2.9-4.5 6.8-4.5 10.9s1.6 8 4.5 10.9c2.9 2.9 6.8 4.5 10.9 4.5z" fill="currentColor"/><path d="M130.7 108.9c-2.9-2.9-6.8-4.5-10.9-4.5-4.1 0-8 1.6-10.9 4.5-2.9 2.9-4.5 6.8-4.5 10.9 0 4.1 1.6 8 4.5 10.9l32.7 32.7c2.9 2.9 6.8 4.5 10.9 4.5 4.1 0 8-1.6 10.9-4.5 2.9-2.9 4.5-6.8 4.5-10.9s-1.6-8-4.5-10.9l-32.7-32.7z" fill="currentColor"/><path d="M370.4 348.6c-2.9-2.9-6.8-4.5-10.9-4.5-4.1 0-8 1.6-10.9 4.5-6 6-6 15.8 0 21.8l32.7 32.7c2.9 2.9 6.8 4.5 10.9 4.5 4.1 0 8-1.6 10.9-4.5 2.9-2.9 4.5-6.8 4.5-10.9s-1.6-8-4.5-10.9l-32.7-32.7z" fill="currentColor"/><path d="M256 160c-52.9 0-96 43.1-96 96s43.1 96 96 96 96-43.1 96-96-43.1-96-96-96z" fill="currentColor"/></svg>';
        const MOON_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path d="M12 11.807A9.002 9.002 0 0 1 10.049 2a9.942 9.942 0 0 0-5.12 2.735c-3.905 3.905-3.905 10.237 0 14.142c3.906 3.906 10.237 3.905 14.143 0a9.946 9.946 0 0 0 2.735-5.119A9.003 9.003 0 0 1 12 11.807z" fill="currentColor"/></svg>';

        function themeBtnHTML(isLight) {
            const svg = isLight ? MOON_SVG : SUN_SVG;
            const label = isLight ? 'Dark' : 'Light';
            return svg + '<span class="theme-label">' + label + '</span>';
        }

        function applyTermTheme() {
            if (!term) return;
            const isLight = document.body.classList.contains('light');
            term.options = { theme: isLight ? LIGHT_THEME : DARK_THEME };
        }

        function setRandomBg(isLight) {
            const list = isLight ? (window.__lightBgs || []) : (window.__darkBgs || []);
            const folder = isLight ? 'light' : 'dark';
            if (list.length === 0) {
                document.body.style.backgroundImage = '';
                return;
            }
            const bg = list[Math.floor(Math.random() * list.length)];
            document.body.style.backgroundImage = 'url(/static/backgrounds/' + folder + '/' + bg + ')';
        }

        function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'light') {
                document.body.classList.add('light');
                btnTheme.innerHTML = themeBtnHTML(true);
                btnThemeLogin.innerHTML = MOON_SVG;
            } else if (saved === 'dark') {
                document.body.classList.remove('light');
                btnTheme.innerHTML = themeBtnHTML(false);
                btnThemeLogin.innerHTML = SUN_SVG;
            } else {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (!prefersDark) {
                    document.body.classList.add('light');
                    btnTheme.innerHTML = themeBtnHTML(true);
                    btnThemeLogin.innerHTML = MOON_SVG;
                } else {
                    btnTheme.innerHTML = themeBtnHTML(false);
                    btnThemeLogin.innerHTML = SUN_SVG;
                }
            }
            applyTermTheme();
            setRandomBg(document.body.classList.contains('light'));
        }

        function toggleTheme() {
            document.body.classList.toggle('light');
            const isLight = document.body.classList.contains('light');
            btnTheme.innerHTML = themeBtnHTML(isLight);
            btnThemeLogin.innerHTML = isLight ? MOON_SVG : SUN_SVG;
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            applyTermTheme();
            setRandomBg(isLight);
        }

        btnTheme.addEventListener('click', toggleTheme);
        document.getElementById('btn-theme-login').addEventListener('click', toggleTheme);
        document.getElementById('btn-new-session').addEventListener('click', () => { location.reload(); });
        initTheme();

        authMethodRadios.forEach(radio => {
            radio.addEventListener('change', () => {
                const m = getAuthMethod();
                groupToken.style.display = m === 'token' ? 'block' : 'none';
                groupUsername.style.display = m === 'credentials' ? 'block' : 'none';
                groupPassword.style.display = m === 'credentials' ? 'block' : 'none';
            });
        });

        (async () => {
            const creds = await loadCredentials();
            if (creds) {
                const radioToCheck = document.querySelector(`input[name="auth-method"][value="${creds.method}"]`);
                if (radioToCheck) radioToCheck.checked = true;
                const m = getAuthMethod();
                groupToken.style.display = m === 'token' ? 'block' : 'none';
                groupUsername.style.display = m === 'credentials' ? 'block' : 'none';
                groupPassword.style.display = m === 'credentials' ? 'block' : 'none';
                if (creds.method === 'token') {
                    document.getElementById('input-token').value = creds.password;
                } else {
                    document.getElementById('input-username').value = creds.login;
                    document.getElementById('input-password').value = creds.password;
                }
                await autoConnect(creds);
            }
        })();

        window.addEventListener('DOMContentLoaded', () => {
            const usernameInput = document.getElementById('input-username');
            const tokenInput = document.getElementById('input-token');
            const inputToFocus = tokenInput || usernameInput;
            if (inputToFocus) {
                setTimeout(() => inputToFocus.focus(), 100);
            }
        });

        async function autoConnect(creds) {
            let login = '', password = '';
            if (creds.method === 'token') {
                password = creds.password;
                login = password;
            } else {
                login = creds.login;
                password = creds.password;
            }
            if (login && password) {
                connectWebSocket(login, password);
            }
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            loginError.textContent = '';
            connStatus.className = 'connection-status connecting';
            const m = getAuthMethod();
            let login = '', password = '';
            if (m === 'token') {
                password = document.getElementById('input-token').value.trim();
                if (!password) { loginError.textContent = 'Token is required'; connStatus.className = 'connection-status disconnected'; return; }
                login = password;
            } else {
                login = document.getElementById('input-username').value.trim();
                password = document.getElementById('input-password').value.trim();
                if (!login || !password) { loginError.textContent = 'Username and password required'; connStatus.className = 'connection-status disconnected'; return; }
            }
            connectWebSocket(login, password);
        });

        function connectWebSocket(login, password) {
            authPassword = password;
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
            ws.onopen = () => {
                ws.send(JSON.stringify({ type: 'auth', login: login, password: password }));
            };
            ws.onmessage = (event) => {
                try { handleWebSocketMessage(JSON.parse(event.data)); }
                catch (e) { console.error('Parse error:', e); }
            };
            ws.onclose = () => { connStatus.className = 'connection-status disconnected'; if (term) term.writeln('\r\n\x1b[31mConnection closed\x1b[0m'); };
            ws.onerror = () => { loginError.textContent = 'Connection error'; connStatus.className = 'connection-status disconnected'; };
        }

        function initTerminal() {
            const termContainer = document.getElementById('xterm-clip');
            term = new Terminal({
                cursorBlink: true,
                cursorStyle: 'block',
                fontSize: 14,
                fontFamily: '"MesloLGM Nerd Font", "JetBrains Mono", "Cascadia Code", "Fira Code", Consolas, Monaco, "Courier New", monospace',
                fontWeight: 'normal',
                fontWeightBold: 'bold',
                letterSpacing: 0,
                lineHeight: 1.0,
                allowProposedApi: true,
                theme: document.body.classList.contains('light') ? LIGHT_THEME : DARK_THEME,
            });
            fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);
            term.open(termContainer);
            fitAddon.fit();

            term.onData(data => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'key', content: data }));
                }
            });

            term.attachCustomKeyEventHandler((e) => {
                if (e.type !== 'keydown') return true;

                if (e.ctrlKey && e.key === 'Backspace') {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'key', content: '\x1b\x7f' }));
                    }
                    e.preventDefault();
                    return false;
                }
                if (e.ctrlKey && e.key === 'ArrowLeft') {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'key', content: '\x1bb' }));
                    }
                    e.preventDefault();
                    return false;
                }
                if (e.ctrlKey && e.key === 'ArrowRight') {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'key', content: '\x1bf' }));
                    }
                    e.preventDefault();
                    return false;
                }
                if (e.ctrlKey && e.key === 'c') {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'key', content: '\x03' }));
                    }
                    e.preventDefault();
                    return false;
                }
                if (e.ctrlKey && e.key === 'd') {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'key', content: '\x04' }));
                    }
                    e.preventDefault();
                    return false;
                }
                if (e.ctrlKey && e.key === 'z') {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'key', content: '\x1a' }));
                    }
                    e.preventDefault();
                    return false;
                }

                return true;
            });

            // Capture-phase listener intercepts browser-reserved shortcuts (Ctrl+W, Ctrl+U)
            // before the browser can act on them
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && (e.key === 'w' || e.key === 'u')) {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        const seq = e.key === 'w' ? '\x17' : '\x15';
                        ws.send(JSON.stringify({ type: 'key', content: seq }));
                    }
                    e.preventDefault();
                    e.stopImmediatePropagation();
                }
            }, { capture: true });

            term.onResize(({ cols, rows }) => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'resize', cols, rows }));
                }
                sessionStorage.setItem('term-size', JSON.stringify({ cols, rows }));
            });

            window.addEventListener('resize', () => {
                if (fitAddon) fitAddon.fit();
            });

            term.focus();
            applyTermTheme();
        }

        function sendResizeFromFit() {
            if (!fitAddon || !ws || ws.readyState !== WebSocket.OPEN) return;
            try {
                const dims = fitAddon.proposeDimensions();
                if (dims && dims.cols > 0 && dims.rows > 0) {
                    ws.send(JSON.stringify({ type: 'resize', cols: dims.cols, rows: dims.rows }));
                }
            } catch (e) {
                // fallback
            }
        }

        async function handleWebSocketMessage(msg) {
            switch (msg.type) {
                case 'auth_success':
                    sessionID = msg.session; currentUser = msg.user;
                    hostInfo.hostname = msg.hostname || '';
                    hostInfo.ip = window.location.hostname || window.location.host || '';
                    await saveCredentials(getAuthMethod(),
                        getAuthMethod() === 'token' ? '' : document.getElementById('input-username').value.trim(),
                        document.getElementById('input-password')?.value.trim() || document.getElementById('input-token').value.trim()
                    ).catch(e => console.error('saveCredentials failed:', e));
                    showTerminal();
                    if (hostInfo.hostname) document.getElementById('host-info').textContent = `${hostInfo.hostname}  |  ${hostInfo.ip}`;
                    term.writeln(`\r\n\x1b[32mConnected as ${currentUser}\x1b[0m`);
                    // Send terminal size after connection
                    setTimeout(sendResizeFromFit, 200);
                    break;
                case 'auth_error':
                    loginError.textContent = msg.error || 'Authentication failed'; connStatus.className = 'connection-status disconnected'; ws.close(); break;
                case 'output':
                    if (term) term.write(msg.content || '');
                    break;
                case 'system':
                    if (term) term.writeln(`\r\n\x1b[36m${msg.content || ''}\x1b[0m`);
                    break;
                case 'error':
                    if (term) term.writeln(`\r\n\x1b[31m${msg.content || ''}\x1b[0m`);
                    break;
                case 'ping': ws.send(JSON.stringify({ type: 'pong' })); break;
                case 'pong': break;
            }
        }

        function showTerminal() {
            loginScreen.classList.add('hidden');
            terminalScreen.classList.add('visible');
            connStatus.className = 'connection-status connected';
            userInfo.innerHTML = `<span class="status-item" title="User">${USER_SVG}${escapeHtml(currentUser || '')}</span>`;
            // Sync mobile
            const mobileInfo = document.getElementById('user-info-mobile');
            if (mobileInfo) mobileInfo.innerHTML = userInfo.innerHTML;
            initTerminal();
            fetchSystemStatus();
            if (statusInterval) clearInterval(statusInterval);
            statusInterval = setInterval(fetchSystemStatus, 5000);
        }

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        btnLogout.addEventListener('click', () => {
            if (ws) ws.close();
            if (statusInterval) { clearInterval(statusInterval); statusInterval = null; }
            terminalScreen.classList.remove('visible');
            loginScreen.classList.remove('hidden');
            if (term) { term.dispose(); term = null; fitAddon = null; }
            document.getElementById('xterm-clip').innerHTML = '';
            sessionID = null; currentUser = null; authPassword = ''; hostInfo = { hostname: '', ip: '' };
            clearCredentials();
        });

        window.addEventListener('beforeunload', (e) => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                e.preventDefault();
                e.returnValue = '';
                return '';
            }
        });

        const USER_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="3.75" r="3.25"/><path d="M13.18 13.5a6.49 6.49 0 0 0-12.36 0Z"/></g></svg>';
        const CPU_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 16 16"><path fill="currentColor" d="M5 0a.5.5 0 0 1 .5.5V2h1V.5a.5.5 0 0 1 1 0V2h1V.5a.5.5 0 0 1 1 0V2h1V.5a.5.5 0 0 1 1 0V2A2.5 2.5 0 0 1 14 4.5h1.5a.5.5 0 0 1 0 1H14v1h1.5a.5.5 0 0 1 0 1H14v1h1.5a.5.5 0 0 1 0 1H14v1h1.5a.5.5 0 0 1 0 1H14a2.5 2.5 0 0 1-2.5 2.5v1.5a.5.5 0 0 1-1 0V14h-1v1.5a.5.5 0 0 1-1 0V14h-1v1.5a.5.5 0 0 1-1 0V14h-1v1.5a.5.5 0 0 1-1 0V14A2.5 2.5 0 0 1 2 11.5H.5a.5.5 0 0 1 0-1H2v-1H.5a.5.5 0 0 1 0-1H2v-1H.5a.5.5 0 0 1 0-1H2v-1H.5a.5.5 0 0 1 0-1H2A2.5 2.5 0 0 1 4.5 2V.5A.5.5 0 0 1 5 0m-.5 3A1.5 1.5 0 0 0 3 4.5v7A1.5 1.5 0 0 0 4.5 13h7a1.5 1.5 0 0 0 1.5-1.5v-7A1.5 1.5 0 0 0 11.5 3zM5 6.5A1.5 1.5 0 0 1 6.5 5h3A1.5 1.5 0 0 1 11 6.5v3A1.5 1.5 0 0 1 9.5 11h-3A1.5 1.5 0 0 1 5 9.5zM6.5 6a.5.5 0 0 0-.5.5v3a.5.5 0 0 0 .5.5h3a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 0-.5-.5z"/></svg>';
        const RAM_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 16 16"><path fill="currentColor" d="M3.5 5h9a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-.5.5h-9a.5.5 0 0 1-.5-.5v-3a.5.5 0 0 1 .5-.5M9 8V6H7v2zM6 6H4v2h2zm4 2h2V6h-2zM3 3h10c1.103 0 2 .897 2 2v4a2 2 0 0 1-1 1.731v1.019c0 .689-.561 1.25-1.25 1.25H9.5a.5.5 0 0 1-.354-.146L8 11.708l-1.146 1.146A.5.5 0 0 1 6.5 13H3.25C2.561 13 2 12.439 2 11.75v-1.019A2 2 0 0 1 1 9V5c0-1.103.897-2 3-2m.25 9h3.043l1-1H3v.75c0 .138.112.25.25.25m9.5 0a.25.25 0 0 0 .25-.25V11H8.707l1 1zm.25-2c.552 0 1-.449 1-1V5c0-.551-.448-1-1-1H3c-.552 0-1 .449-1 1v4c0 .551.448 1 1 1z"/></svg>';
        const DISK_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 16 16"><path fill="currentColor" fill-rule="evenodd" d="M3 2.5h10a.5.5 0 0 1 .5.5v5.063A2 2 0 0 0 13 8H3q-.26 0-.5.063V3a.5.5 0 0 1 .5-.5M2.5 10v3a.5.5 0 0 0 .5.5h10a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 0-.5-.5H3a.5.5 0 0 0-.5.5M1 10V3a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2zm11 1.5a1 1 0 1 1-2 0a1 1 0 0 1 2 0m-4 1a1 1 0 1 0 0-2a1 1 0 0 0 0 2" clip-rule="evenodd"/></svg>';

        async function fetchSystemStatus() {
            if (!authPassword) return;
            try {
                const headers = {};
                if (currentUser) {
                    headers['Authorization'] = 'Basic ' + btoa(encodeURIComponent(currentUser) + ':' + encodeURIComponent(authPassword));
                } else {
                    headers['X-Auth-Token'] = authPassword;
                }
                const resp = await fetch('/api/status', { headers });
                if (!resp.ok) throw new Error('Status fetch failed: ' + resp.status);
                const data = await resp.json();
                updateStatusDisplay(data);
            } catch (e) {
                console.warn('Failed to fetch system status:', e);
                if (currentUser) {
                    userInfo.innerHTML = userInfo.innerHTML.replace(
                        /<span class="status-item">.*?<\/span>/g,
                        (m, i) => i === 0 ? m : ''
                    );
                }
            }
        }

        function formatBytes(bytes) {
            if (bytes == null) return '-';
            if (bytes === 0) return '0 B';
            var units = ['B', 'K', 'M', 'G', 'T'];
            var i = 0;
            while (bytes >= 1024 && i < units.length - 1) { bytes /= 1024; i++; }
            return (i ? bytes.toFixed(1) : bytes) + ' ' + units[i];
        }

        function updateStatusDisplay(data) {
            var cpuPct = '-';
            if (data.cpu && data.cpu.usage_pct >= 0) {
                cpuPct = data.cpu.usage_pct.toFixed(1) + '%';
            } else if (data.cpu && data.cpu.load1 != null && data.cpu.cores) {
                var load = parseFloat(data.cpu.load1);
                if (!isNaN(load)) {
                    cpuPct = (load / data.cpu.cores * 100).toFixed(1) + '%';
                }
            }
            var memStr = '-';
            if (data.memory && data.memory.used != null) {
                memStr = formatBytes(data.memory.used) + ' / ' + formatBytes(data.memory.total);
                if (data.memory.used_pct != null) {
                    memStr += ' (' + Math.round(data.memory.used_pct) + '%)';
                }
            }
            var diskStr = '-';
            if (data.disk && data.disk.used != null) {
                diskStr = formatBytes(data.disk.used) + ' / ' + formatBytes(data.disk.total);
                if (data.disk.used_pct != null) {
                    diskStr += ' (' + Math.round(data.disk.used_pct) + '%)';
                }
            }
            userInfo.innerHTML =
                '<span class="status-item" title="User">' + USER_SVG + escapeHtml(currentUser || '') + '</span>' +
                '<span class="header-divider" style="height:16px;"></span>' +
                '<span class="status-item" title="CPU usage (' + escapeHtml(data.cpu && data.cpu.cores ? data.cpu.cores + ' cores' : '') + ')">' + CPU_SVG + escapeHtml(cpuPct) + '</span>' +
                '<span class="status-item" title="Memory usage (used / total)">' + RAM_SVG + escapeHtml(memStr) + '</span>' +
                '<span class="status-item" title="Disk usage (used / total)">' + DISK_SVG + escapeHtml(diskStr) + '</span>';
            var mobileInfo = document.getElementById('user-info-mobile');
            if (mobileInfo) mobileInfo.innerHTML = userInfo.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', function() {
            var hamburger = document.getElementById('hamburger-btn');
            var dropdown = document.getElementById('header-dropdown');
            var backdrop = document.getElementById('header-dropdown-backdrop');

            function closeDropdown() {
                hamburger.classList.remove('active');
                dropdown.classList.remove('open');
                backdrop.classList.remove('open');
                document.body.style.overflow = '';
            }

            function toggleDropdown(e) {
                e.stopPropagation();
                var isOpen = dropdown.classList.contains('open');
                if (isOpen) {
                    closeDropdown();
                } else {
                    var mobileInfo = document.getElementById('user-info-mobile');
                    var desktopInfo = document.getElementById('user-info');
                    if (mobileInfo && desktopInfo) mobileInfo.innerHTML = desktopInfo.innerHTML;
                    hamburger.classList.add('active');
                    dropdown.classList.add('open');
                    backdrop.classList.add('open');
                    document.body.style.overflow = 'hidden';
                }
            }

            if (hamburger) hamburger.addEventListener('click', toggleDropdown);
            if (backdrop) backdrop.addEventListener('click', closeDropdown);

            document.getElementById('btn-theme-mobile')?.addEventListener('click', function(e) {
                closeDropdown();
                document.getElementById('btn-theme')?.click();
            });
            document.getElementById('btn-new-session-mobile')?.addEventListener('click', function(e) {
                closeDropdown();
                document.getElementById('btn-new-session')?.click();
            });
            document.getElementById('btn-logout-mobile')?.addEventListener('click', function(e) {
                closeDropdown();
                document.getElementById('btn-logout')?.click();
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && dropdown?.classList.contains('open')) {
                    closeDropdown();
                }
            });

            window.addEventListener('resize', function() {
                if (window.innerWidth > 768 && dropdown?.classList.contains('open')) {
                    closeDropdown();
                }
            });
        });
    </script>
</body>
